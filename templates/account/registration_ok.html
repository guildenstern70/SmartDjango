{% extends "base-nav.html" %}
{% load static %}

{% block title %}<title>SmartDjango | Registered</title>{% endblock %}

{% block main %}
<div class="auth-wrapper">
    <div class="auth-card glass-card text-center">

        <!-- Success icon -->
        <div style="width:64px;height:64px;border-radius:50%;background:rgba(34,197,94,.14);
                    border:2px solid rgba(34,197,94,.3);display:flex;align-items:center;
                    justify-content:center;margin:0 auto 1.25rem;font-size:1.8rem;color:var(--success);">
            <i class="bi bi-check-lg"></i>
        </div>

        <h1 style="font-size:1.4rem;font-weight:800;letter-spacing:-.03em;margin-bottom:.4rem;">
            Welcome aboard!
        </h1>
        <p class="text-muted-sd mb-0" style="font-size:.9rem;">
            Your account <strong style="color:var(--accent-hover);">{{ username }}</strong>
            has been created successfully.
        </p>

        <div class="auth-divider" style="margin:1.25rem auto;"></div>

        <p class="text-muted-sd mb-4" style="font-size:.85rem;">
            You can now sign in with your credentials.
        </p>

        <div class="d-grid gap-2">
            <a href="/login/" class="btn btn-accent" id="goto-login-btn">
                <i class="bi bi-box-arrow-in-right me-1"></i>Sign in
            </a>
            <a href="/" class="btn btn-surface">Back to Home</a>
        </div>

    </div>
</div>
{% endblock %}
