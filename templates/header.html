<header>
    <nav class="navbar navbar-expand-md fixed-top sd-navbar">
        <div class="container-fluid">

            <!-- Brand -->
            <a class="navbar-brand sd-brand" href="/home/">
                <span class="sd-brand-dot"></span>
                SmartDjango
                {% if header %}<span class="text-muted-sd fw-500 ms-1">/ {{ header }}</span>{% endif %}
            </a>

            {% if user.is_authenticated %}
            <button class="navbar-toggler border-0" type="button"
                    data-bs-toggle="collapse" data-bs-target="#navbarMain"
                    aria-controls="navbarMain" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarMain">

                <!-- Left nav links -->
                <ul class="navbar-nav me-auto mb-2 mb-md-0">
                    <li class="nav-item">
                        <a id="homelink" class="nav-link" href="/home/">
                            <i class="bi bi-house me-1"></i>Home
                        </a>
                    </li>
                    <li class="nav-item">
                        <a id="carslink" class="nav-link" href="/cars/">
                            <i class="bi bi-car-front me-1"></i>Cars
                        </a>
                    </li>
                    <li class="nav-item">
                        <a id="pageonelink" class="nav-link" href="/another/?title=Page%20One">
                            <i class="bi bi-file-earmark me-1"></i>Page One
                        </a>
                    </li>
                    <li class="nav-item">
                        <a id="pagetwolink" class="nav-link" href="/another/?title=Page%20Two">
                            <i class="bi bi-file-earmark me-1"></i>Page Two
                        </a>
                    </li>
                </ul>

                <!-- Right: theme toggle + user dropdown -->
                <div class="d-flex align-items-center gap-2 me-2">

                    <!-- Theme toggle -->
                    <button id="theme-toggle-btn"
                            class="sd-theme-toggle"
                            onclick="toggleTheme()"
                            title="Switch theme"
                            aria-label="Toggle light/dark theme">
                        <i id="theme-icon" class="bi bi-sun-fill"></i>
                    </button>

                    <!-- User dropdown -->
                    <div class="dropdown">
                        <div class="d-flex align-items-center gap-2 cursor-pointer"
                             data-bs-toggle="dropdown" aria-expanded="false"
                             style="cursor:pointer;">
                            <div class="sd-avatar" title="{{ username }}">
                                {{ username|slice:":1"|upper }}
                            </div>
                            <span class="sd-username-text d-none d-lg-inline">{{ username|title }}</span>
                            <i class="bi bi-chevron-down text-muted-sd" style="font-size:.65rem;"></i>
                        </div>
                        <ul class="dropdown-menu dropdown-menu-end mt-2">
                            <li>
                                <a class="dropdown-item" href="/profile/">
                                    <i class="bi bi-person"></i> Profile
                                </a>
                            </li>
                            <li><hr class="dropdown-divider"></li>
                            <li>
                                <a class="dropdown-item text-danger" href="/logout/">
                                    <i class="bi bi-box-arrow-right"></i> Logout
                                </a>
                            </li>
                        </ul>
                    </div>

                </div>

            </div>
            {% endif %}

        </div>
    </nav>
</header>
