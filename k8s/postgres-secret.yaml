# Secret holding PostgreSQL credentials.
# Values are base64-encoded. To regenerate:
#   echo -n 'smartdjango' | base64   -> c21hcnRkamFuZ28=
#   echo -n 'smartdjango_db' | base64 -> c21hcnRkamFuZ29fZGI=
#
# Change these before deploying to production.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: smartdjango
type: Opaque
data:
  # "smartdjango"
  postgres-user: c21hcnRkamFuZ28=
  # "smartdjango"
  postgres-password: c21hcnRkamFuZ28=
  # "smartdjango_db"
  postgres-db: c21hcnRkamFuZ29fZGI=
